openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: AAAgronegócio Platform API - Farm Listings Marketplace & SaaS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session management
  - name: listings
    description: Farm listing operations
  - name: media
    description: Media upload and management
  - name: analytics
    description: Analytics and metrics
  - name: admin
    description: Admin operations
  - name: seller
    description: Seller operations
  - name: buyer
    description: Buyer account operations
  - name: ai
    description: AI-powered features for premium sellers

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and clear session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me/profile:
    put:
      operationId: updateProfile
      tags: [auth]
      summary: Update user profile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── PUBLIC LISTINGS ─────────────────────────────────────────────────────────
  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get published listings with filters and pagination
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
        - name: search
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: minArea
          in: query
          schema:
            type: number
        - name: maxArea
          in: query
          schema:
            type: number
        - name: propertyType
          in: query
          schema:
            type: string
        - name: hasWater
          in: query
          schema:
            type: boolean
        - name: hasIrrigation
          in: query
          schema:
            type: boolean
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, area_asc, area_desc, newest, featured]
            default: featured
        - name: lat
          in: query
          schema:
            type: number
        - name: lng
          in: query
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Listings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsPage"

  /listings/featured:
    get:
      operationId: getFeaturedListings
      tags: [listings]
      summary: Get featured/premium listings for homepage
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingSummary"

  /listings/map:
    get:
      operationId: getMapListings
      tags: [listings]
      summary: Get listings for map view (lat/lng pins only)
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: propertyType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Map pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapPin"

  /listings/{slug}:
    get:
      operationId: getListingBySlug
      tags: [listings]
      summary: Get full listing details by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{slug}/view:
    post:
      operationId: trackListingView
      tags: [listings]
      summary: Track a listing view
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackViewRequest"
      responses:
        "200":
          description: View tracked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /listings/{slug}/interest:
    post:
      operationId: submitInterest
      tags: [listings]
      summary: Submit buyer interest (generates WhatsApp/email redirect)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterestRequest"
      responses:
        "200":
          description: Interest recorded and contact info returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterestResponse"

  # ─── SELLER LISTINGS ──────────────────────────────────────────────────────────
  /seller/listings:
    get:
      operationId: getSellerListings
      tags: [seller]
      summary: Get seller's own listings
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Seller's listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsPage"
    post:
      operationId: createListing
      tags: [seller]
      summary: Create a new listing (draft)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingRequest"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"

  /seller/listings/{id}:
    get:
      operationId: getSellerListing
      tags: [seller]
      summary: Get seller's listing by ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
    put:
      operationId: updateListing
      tags: [seller]
      summary: Update a listing
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingRequest"
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
    delete:
      operationId: deleteListing
      tags: [seller]
      summary: Delete a listing
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /seller/listings/{id}/submit:
    post:
      operationId: submitListingForReview
      tags: [seller]
      summary: Submit listing for admin review
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"

  /seller/listings/{id}/analytics:
    get:
      operationId: getListingAnalytics
      tags: [seller]
      summary: Get analytics for a specific listing
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
            default: 30d
      responses:
        "200":
          description: Listing analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingAnalytics"

  /seller/dashboard:
    get:
      operationId: getSellerDashboard
      tags: [seller]
      summary: Get seller dashboard summary
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Seller dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerDashboard"

  # ─── MEDIA ────────────────────────────────────────────────────────────────────
  /media/upload:
    post:
      operationId: uploadMedia
      tags: [media]
      summary: Upload media file (image, video, PDF)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                listingId:
                  type: string
                mediaType:
                  type: string
                  enum: [image, video, pdf]
              required:
                - file
                - listingId
                - mediaType
      responses:
        "201":
          description: Media uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"

  /media/{id}:
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Delete a media item
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── BUYER ───────────────────────────────────────────────────────────────────
  /buyer/favorites:
    get:
      operationId: getFavorites
      tags: [buyer]
      summary: Get buyer's saved favorites
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Favorite listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingSummary"

  /buyer/favorites/{listingId}:
    post:
      operationId: addFavorite
      tags: [buyer]
      summary: Add listing to favorites
      security:
        - cookieAuth: []
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Added to favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: removeFavorite
      tags: [buyer]
      summary: Remove listing from favorites
      security:
        - cookieAuth: []
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed from favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /buyer/interests:
    get:
      operationId: getBuyerInterests
      tags: [buyer]
      summary: Get buyer's interest history
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Interest history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterestRecord"

  # ─── ADMIN ───────────────────────────────────────────────────────────────────
  /admin/listings:
    get:
      operationId: adminGetListings
      tags: [admin]
      summary: Get all listings (admin view)
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
        - name: moderationStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminListingsPage"

  /admin/listings/{id}/approve:
    post:
      operationId: approveListing
      tags: [admin]
      summary: Approve a listing for publication
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"

  /admin/listings/{id}/reject:
    post:
      operationId: rejectListing
      tags: [admin]
      summary: Reject a listing with reason
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectListingRequest"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"

  /admin/listings/{id}/feature:
    post:
      operationId: featureListing
      tags: [admin]
      summary: Toggle featured status on a listing
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                featured:
                  type: boolean
              required:
                - featured
      responses:
        "200":
          description: Feature status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPage"

  /admin/users/{id}:
    put:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update user (role, status, premium)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get admin dashboard summary
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Admin dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/analytics:
    get:
      operationId: getAdminAnalytics
      tags: [admin]
      summary: Get platform-wide analytics
      security:
        - cookieAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
            default: 30d
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAnalytics"

  # ─── AI FEATURES ──────────────────────────────────────────────────────────────
  /ai/generate-description:
    post:
      operationId: aiGenerateDescription
      tags: [ai]
      summary: Generate listing description from structured data
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiDescriptionRequest"
      responses:
        "200":
          description: Generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTextResponse"

  /ai/improve-title:
    post:
      operationId: aiImproveTitle
      tags: [ai]
      summary: Improve listing title using AI
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTitleRequest"
      responses:
        "200":
          description: Improved title suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTitleResponse"

  /ai/suggest-price:
    post:
      operationId: aiSuggestPrice
      tags: [ai]
      summary: Suggest price based on comparable listings
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPriceRequest"
      responses:
        "200":
          description: Price suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPriceResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  schemas:
    # ─── CORE ───────────────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - error

    # ─── AUTH ───────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [buyer, seller]
          default: buyer
        phone:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        message:
          type: string
      required:
        - user
        - message

    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, seller, buyer]
        phone:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isPremium:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - isPremium
        - isActive
        - createdAt

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string

    # ─── LISTINGS ────────────────────────────────────────────────────────────────
    ListingSummary:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        price:
          type: number
          nullable: true
        negotiable:
          type: boolean
        totalArea:
          type: number
          nullable: true
        areaUnit:
          type: string
          nullable: true
        pricePerHectare:
          type: number
          nullable: true
        state:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        propertyType:
          type: string
          nullable: true
        isFeatured:
          type: boolean
        isPremium:
          type: boolean
        coverImageUrl:
          type: string
          nullable: true
        thumbnailUrls:
          type: array
          items:
            type: string
        viewCount:
          type: integer
        favoriteCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - title
        - negotiable
        - isFeatured
        - isPremium
        - thumbnailUrls
        - viewCount
        - favoriteCount
        - createdAt

    ListingDetail:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        negotiable:
          type: boolean
        status:
