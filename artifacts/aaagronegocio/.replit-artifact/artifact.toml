kind = "web"
previewPath = "/"
title = "AAAgronegócio"
version = "1.0.0"
id = "artifacts/aaagronegocio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24611

[services.development]
run = "pnpm --filter @workspace/aaagronegocio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aaagronegocio", "run", "build" ]
publicDir = "artifacts/aaagronegocio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24611"
BASE_PATH = "/"
