packages:
  "framer-motion": "For page transitions, scroll animations, and premium micro-interactions"
  "recharts": "For seller and admin analytics dashboards"
  "react-hook-form": "For complex, multi-step property listing forms"
  "@hookform/resolvers": "For Zod validation integration with react-hook-form"
  "date-fns": "For localized date formatting (pt-BR)"
  "clsx": "For classname merging in UI components"
  "tailwind-merge": "For classname merging with Tailwind v4"
  "@radix-ui/react-slot": "For component slotting in UI library"

